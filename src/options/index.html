<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>add_header — Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="options">
      <header class="options__header">
        <div>
          <h1>add_header</h1>
          <p class="options__subtitle">
            Site rule sets match URL patterns and use profile tabs — tab 1 is the
            default header set. Patterns:
            <code>example.com</code>, <code>https://example.com</code>, or
            <code>*example.com</code>
          </p>
        </div>
        <label class="toggle">
          <input type="checkbox" id="global-enabled" />
          <span>Extension enabled</span>
        </label>
      </header>

      <section class="options__toolbar">
        <div class="options__toolbar-primary">
          <button type="button" id="add-site" class="btn btn--primary">
            Add site rule set
          </button>
        </div>
        <div class="options__toolbar-secondary">
          <button type="button" id="export-settings" class="btn btn--secondary">
            Export
          </button>
          <button type="button" id="import-settings" class="btn btn--secondary">
            Import
          </button>
          <input
            type="file"
            id="import-file"
            accept="application/json,.json"
            hidden
          />
        </div>
      </section>

      <div id="rules-list" class="rules-list"></div>

      <template id="site-rule-template">
        <article class="site-rule">
          <div class="site-rule__head">
            <label class="toggle">
              <input type="checkbox" class="site-rule__enabled" />
              <span>On</span>
            </label>
            <button type="button" class="btn btn--ghost site-rule__delete">
              Remove rule set
            </button>
          </div>

          <div class="site-rule__patterns">
            <p class="site-rule__label">URL patterns</p>
            <div class="patterns-list"></div>
            <button type="button" class="btn btn--secondary add-pattern">
              + Add pattern
            </button>
          </div>

          <div class="site-rule__section">
            <div class="profile-tabs-row">
              <div class="profile-tabs" role="tablist"></div>
              <button type="button" class="profile-tab profile-tab--add add-profile-tab" title="Add profile">
                +
              </button>
            </div>
            <div class="profile-editor">
              <input
                type="text"
                class="profile-editor__name input"
                placeholder="Profile name"
                spellcheck="false"
              />
              <input
                type="text"
                class="profile-editor__description input"
                placeholder="What state does this profile simulate? (optional)"
                spellcheck="false"
              />
              <div class="headers"></div>
              <div class="profile-editor__actions">
                <button type="button" class="btn btn--ghost duplicate-profile-tab">
                  Duplicate profile
                </button>
                <button type="button" class="btn btn--ghost remove-profile-tab" hidden>
                  Remove profile
                </button>
              </div>
            </div>
          </div>
        </article>
      </template>

      <template id="pattern-row-template">
        <div class="pattern-row">
          <input
            type="text"
            class="pattern-row__input input"
            placeholder="example.com, https://example.com, or *example.com"
            spellcheck="false"
          />
          <label class="toggle pattern-row__wildcard" title="Also match *.example.com (all subdomains of this host)">
            <input type="checkbox" class="pattern-row__subdomains" />
            <span>Wildcard</span>
          </label>
          <button type="button" class="btn btn--ghost pattern-row__delete" title="Remove URL">
            ×
          </button>
        </div>
      </template>

      <template id="header-row-template">
        <div class="header-row">
          <label class="toggle">
            <input type="checkbox" class="header-row__enabled" checked />
          </label>
          <input
            type="text"
            class="header-row__name input"
            placeholder="Header name"
            spellcheck="false"
          />
          <input
            type="text"
            class="header-row__value input"
            placeholder="Header value"
            spellcheck="false"
          />
          <button type="button" class="btn btn--ghost header-row__delete">
            ×
          </button>
        </div>
      </template>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
